<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Snake</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(20, 20px);
      grid-template-rows: repeat(20, 20px);
      gap: 1px;
      background: #333;
    }

    .cell {
      width: 20px;
      height: 20px;
      background: #eee;
    }

    .snake {
      background: green;
    }

    .food {
      background: red;
    }

    .game-over {
      color: red;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const { useState, useEffect } = React;

    function Game() {
      const size = 20;

      const [snake, setSnake] = useState([
        { x: 5, y: 5 },
        { x: 4, y: 5 },
        { x: 3, y: 5 }
      ]);

      const [direction, setDirection] = useState({ x: 1, y: 0 });

      const [food, setFood] = useState({
        x: Math.floor(Math.random() * size),
        y: Math.floor(Math.random() * size)
      });

      const [gameOver, setGameOver] = useState(false);

      // WASD
      useEffect(() => {
        const handleKey = (e) => {
          switch (e.key.toLowerCase()) {
            case "w": setDirection({ x: 0, y: -1 }); break;
            case "s": setDirection({ x: 0, y: 1 }); break;
            case "a": setDirection({ x: -1, y: 0 }); break;
            case "d": setDirection({ x: 1, y: 0 }); break;
          }
        };

        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, []);

      // Loop
      useEffect(() => {
        if (gameOver) return;

        const interval = setInterval(() => {
          setSnake(prevSnake => {
            const head = prevSnake[0];

            const newHead = {
              x: head.x + direction.x,
              y: head.y + direction.y
            };

            //  COLISIÓN CON PAREDES
            if (
              newHead.x < 0 ||
              newHead.x >= size ||
              newHead.y < 0 ||
              newHead.y >= size
            ) {
              setGameOver(true);
              return prevSnake;
            }

            //  COLISIÓN CONSIGO MISMA
            const hitSelf = prevSnake.some(
              s => s.x === newHead.x && s.y === newHead.y
            );

            if (hitSelf) {
              setGameOver(true);
              return prevSnake;
            }

            // COMER
            const ateFood =
              newHead.x === food.x && newHead.y === food.y;

            let newSnake;

            if (ateFood) {
              newSnake = [newHead, ...prevSnake];

              setFood({
                x: Math.floor(Math.random() * size),
                y: Math.floor(Math.random() * size)
              });

            } else {
              newSnake = [newHead, ...prevSnake.slice(0, -1)];
            }

            return newSnake;
          });
        }, 200);

        return () => clearInterval(interval);
      }, [direction, food, gameOver]);

      return (
        <div>
          <h2>Snake - Colisiones</h2>

          {gameOver && <p className="game-over">Game Over</p>}

          <Board snake={snake} food={food} />
        </div>
      );
    }

    function Board({ snake, food }) {
      const size = 20;
      const cells = [];

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {

          const isSnake = snake.some(
            s => s.x === x && s.y === y
          );

          const isFood = food.x === x && food.y === y;

          let className = "cell";
          if (isSnake) className += " snake";
          if (isFood) className += " food";

          cells.push(
            <div key={`${x}-${y}`} className={className}></div>
          );
        }
      }

      return <div className="board">{cells}</div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Game />);

  </script>
</body>
</html>
